<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Road to 200 — Garage Iron</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#15171A; --panel:#1F2328; --panel-hi:#262B31; --line:#31373F;
    --text:#E8EAED; --muted:#9AA3AD; --faint:#6B7480; --collar:#FFAA1D; --good:#7BC96F;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Barlow','Helvetica Neue',sans-serif}
  .wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
  .eyebrow{font-family:'Oswald',sans-serif;font-weight:600;font-size:13px;letter-spacing:.22em;color:var(--collar);text-transform:uppercase}
  h1{font-family:'Oswald',sans-serif;font-weight:500;font-size:30px;margin:2px 0 14px;letter-spacing:.02em;text-transform:uppercase}
  h2{font-family:'Oswald',sans-serif;font-weight:500;font-size:20px;letter-spacing:.05em;text-transform:uppercase;margin:0}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:12px}
  nav{display:flex;gap:6px;margin-top:18px;border-bottom:1px solid var(--line)}
  nav button{background:none;border:none;cursor:pointer;padding:10px 14px;font-family:'Oswald',sans-serif;font-size:15px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);border-bottom:3px solid transparent}
  nav button.on{color:var(--text);border-bottom-color:var(--collar)}
  .btn{background:var(--collar);color:#1A1408;border:none;border-radius:8px;padding:10px 16px;font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;font-weight:600}
  .btn.ghost{background:var(--panel-hi);color:var(--muted)}
  input{background:var(--bg);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:10px 12px;font-size:15px;font-family:'Barlow',sans-serif}
  input:focus-visible,button:focus-visible{outline:2px solid var(--collar);outline-offset:2px}
  .ex{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:transparent;border:none;border-top:1px solid var(--line);padding:11px 4px;cursor:pointer;color:var(--text);font-size:15px;font-family:'Barlow',sans-serif}
  .ex.on{background:var(--panel-hi);color:var(--faint)}
  .ex.on .name{text-decoration:line-through}
  .box{width:20px;height:20px;border-radius:4px;flex-shrink:0;border:2px solid var(--faint);display:flex;align-items:center;justify-content:center;color:var(--bg);font-weight:700;font-size:13px}
  .ex.on .box{border-color:var(--collar);background:var(--collar)}
  .stat .lab{font-size:12px;color:var(--faint);text-transform:uppercase;letter-spacing:.08em}
  .stat .val{font-family:'Oswald',sans-serif;font-size:18px;color:var(--collar)}
  .muted{font-size:14px;color:var(--muted)}
  .faint{color:var(--faint)}
  .row{display:flex;gap:10px;align-items:center}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Garage Iron</div>
  <h1>Road to 200</h1>
  <div class="card" id="platebar"></div>
  <nav>
    <button data-tab="today" class="on">Today</button>
    <button data-tab="lifts">Lift Log</button>
    <button data-tab="progress">Progress</button>
  </nav>
  <main id="main"></main>
</div>

<script>
"use strict";
// ---------- program ----------
const P1=[
 {id:"b1",time:"9:00",name:"Block 1 · Chest & Arms",ex:[
  {id:"flyes",n:"DB flyes on bench",s:"3×10–12",w:1,d:"Lie on the bench, dumbbells above your chest, palms facing each other, slight bend in the elbows. Lower the weights out wide in an arc until you feel a stretch across your chest, then squeeze them back together like hugging a barrel. Don't turn it into a press — the elbow bend stays fixed."},
  {id:"hammer",n:"Hammer curls",s:"3×10–12",w:1,d:"Stand tall, dumbbells at your sides with palms facing each other (like holding hammers). Curl up without swinging — elbows stay pinned to your ribs. Hits the biceps and forearms."},
  {id:"skull",n:"EZ bar skull crushers",s:"3×10–12",w:1,d:"Lie on the bench, EZ bar pressed above your chest. Bending ONLY at the elbows, lower the bar toward your forehead, then press back up. Upper arms stay vertical the whole time. Go light — this one humbles people."}]},
 {id:"b2",time:"12:30",name:"Block 2 · Chest & Shoulders",ex:[
  {id:"bench",n:"Barbell bench press",s:"3×8–12",w:1,d:"Unrack the bar, lower it to mid-chest with control, press up until arms lock out. Feet planted, shoulder blades pinched back into the bench, bar path slightly diagonal. Benching alone: don't grind to absolute failure, and leave the collars loose enough that you could tilt plates off in a pinch."},
  {id:"incline",n:"Incline DB press",s:"3×8–12",w:1,d:"Set the bench to a 30–45° incline. Same press motion, but the angle shifts the work to your upper chest — the part that fills out a shirt. Lower until you feel a stretch, press up and slightly together."},
  {id:"ohp",n:"Overhead DB press",s:"3×8–12",w:1,d:"Seated or standing, dumbbells at shoulder height, palms forward. Press straight overhead until arms lock out, lower with control. Keep your ribs down — don't arch your lower back to cheat the weight up."}]},
 {id:"b3",time:"15:30",name:"Block 3 · Back, Arms & Core",ex:[
  {id:"rows",n:"EZ bar bent-over rows",s:"3×8–12",w:1,d:"Hinge at the hips until your torso is about 45°, back flat, knees soft. Pull the bar to your belly button, squeezing shoulder blades together, then lower slowly. If your lower back rounds, stand up a bit more."},
  {id:"curls",n:"EZ bar curls",s:"3×8–12",w:1,d:"Grip the angled part of the EZ bar (easier on the wrists than a straight bar). Curl up with elbows pinned at your sides, squeeze at the top, lower for a slow 2–3 count. The lowering builds as much muscle as the lifting."},
  {id:"cgp",n:"Close-grip press",s:"3×8–12",w:1,d:"Lie on the bench, hands on the EZ bar's inner grips, elbows tucked close to your body. Press up and lower to your lower chest. The narrow grip shifts the work from chest to triceps — the muscle that's 2/3 of your arm size."},
  {id:"situps",n:"Decline sit-ups",s:"3×10–15",w:1,d:"Hook your feet into the sit-up bench. Lower yourself back with control, come up until your chest nears your knees. Once 15 reps get easy, hold a plate at your chest instead of adding reps."},
  {id:"plank",n:"Plank",s:"3×30–45s",w:0,d:"Forearms and toes, body in a straight line from head to heels. Squeeze your glutes and brace your abs like you're about to take a punch. If your hips sag or pike up, the set is over."}]}];
const CARDIO=[{id:"cardio",time:"12:30",name:"Cardio Break",ex:[
  {id:"ride",n:"Bike, pool laps, or treading water — 20–30 min",s:"",w:0,d:"Conversational pace — you should be able to talk in short sentences. This is about burning calories and building your engine, not destroying yourself. Zone 2 effort, roughly 6/10."},
  {id:"bonus",n:"Bonus: decline sit-ups 2×15",s:"",w:0,d:"Optional finisher if you've got 3 minutes left. Same form as strength days."}]}];
const PROGRAM={
 0:[{id:"rest",time:"",name:"Rest Day",ex:[{id:"walk",n:"Optional: easy walk or float in the pool",s:"",w:0,d:"Rest is where muscle actually gets built. A gentle walk or float helps recovery — anything harder defeats the purpose."}]}],
 1:P1, 2:CARDIO, 3:P1, 4:CARDIO,
 5:[{id:"legs",time:"9:00",name:"Legs · Quick Maintenance",ex:[
   {id:"goblet",n:"Goblet squats",s:"2×10",w:1,d:"Hold one dumbbell vertically against your chest like a goblet. Squat down until thighs are parallel (or as low as comfortable), keeping your chest up and heels down. Drive up through your whole foot."},
   {id:"ext",n:"Leg extensions",s:"2×10",w:1,d:"Seated on the bench, shins behind the pad. Extend your legs until straight, pause a beat at the top, lower with control. Don't slam the weight down."},
   {id:"curl",n:"Lying leg curls",s:"2×10",w:1,d:"Face down on the bench, heels under the pad. Curl your heels toward your butt, squeeze at the top, lower slowly. Keep your hips pressed into the bench."}]}, P1[1], P1[2]],
 6:[{id:"mace",time:"10:00",name:"Mace + Active Fun",ex:[
   {id:"m360",n:"Mace 360 swings",s:"3×10 / side",w:0,d:"Hands stacked at the end of the handle, ball behind your head. Swing the mace in a full circle around your head, catching the momentum with your core and shoulders. Start slow — smooth beats fast. Watch a video before your first session."},
   {id:"pend",n:"Mace front pendulums",s:"3×10",w:0,d:"Hold the mace in front of you and let the ball swing side to side like a pendulum, resisting the pull with your grip and core. Great warm-up before 360s."},
   {id:"fun",n:"Anything fun: bike, swim, yard work",s:"",w:0,d:"Move for at least 20 minutes doing something you enjoy. Consistency comes from not hating your program."}]}]
};
const DAYS=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const START_W=230, GOAL_W=200, KEY="recomp-tracker-v1";

// ---------- state ----------
let data={logs:{},lifts:{},weights:[],meas:[]};
try{const raw=localStorage.getItem(KEY); if(raw) data=JSON.parse(raw);}catch(e){}
const save=()=>{try{localStorage.setItem(KEY,JSON.stringify(data));}catch(e){console.error(e);}};
const today=()=>new Date().toISOString().slice(0,10);
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
let tab="today";

// ---------- plate bar ----------
function renderBar(){
  const cur=data.weights.length?data.weights[data.weights.length-1].lb:START_W;
  const lost=Math.max(0,Math.min(START_W-GOAL_W,START_W-cur));
  const remaining=6-Math.floor(lost/5);
  let plates="";
  for(let i=0;i<6;i++){
    const on=i<remaining;
    plates+=`<div style="width:12px;height:${on?44:12}px;margin-left:3px;border-radius:3px;align-self:center;transition:height .4s,background .4s;${on?"background:#4A525B;border:1px solid #5B646E":"border:1px dashed var(--line)"}"></div>`;
  }
  document.getElementById("platebar").innerHTML=`
   <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px">
     <span class="muted" style="font-size:13px">Every 5 lbs lost strips a plate off the bar</span>
     <span style="font-family:'Oswald',sans-serif;font-size:22px;color:var(--collar)">${cur}<span style="font-size:13px;color:var(--muted)"> lb</span></span>
   </div>
   <div style="display:flex;align-items:center;height:44px">
     <div style="width:10px;height:26px;background:linear-gradient(180deg,#D8DDE3,#8E979F 55%,#B9C0C7);border-radius:2px"></div>
     <div style="flex:1;height:8px;background:linear-gradient(180deg,#D8DDE3,#8E979F 55%,#B9C0C7);border-radius:4px"></div>
     ${plates}
     <div style="width:14px;height:22px;background:var(--collar);border-radius:3px;margin-left:4px"></div>
   </div>
   <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--faint);margin-top:6px">
     <span>${lost} lb down</span><span>${Math.max(0,cur-GOAL_W)} lb to go · goal ${GOAL_W}</span>
   </div>`;
}

// ---------- today ----------
let timerLeft=0,timerTotal=0,timerInt=null;
function startTimer(s){timerTotal=s;timerLeft=s;clearInterval(timerInt);
  timerInt=setInterval(()=>{timerLeft--;renderTimer();if(timerLeft<=0)clearInterval(timerInt);},1000);renderTimer();}
function stopTimer(){clearInterval(timerInt);timerLeft=0;timerTotal=0;renderTimer();}
function renderTimer(){
  const el=document.getElementById("timer"); if(!el)return;
  const running=timerLeft>0, done=timerTotal>0&&timerLeft<=0;
  const mm=Math.floor(Math.max(0,timerLeft)/60), ss=String(Math.max(0,timerLeft)%60).padStart(2,"0");
  el.innerHTML=`
   <div style="flex:1"><div class="stat"><div class="lab">Rest timer</div>
   <div style="font-family:'Oswald',sans-serif;font-size:30px;color:${running?"var(--collar)":done?"var(--good)":"var(--text)"}">${running?mm+":"+ss:done?"GO":"—:—"}</div></div></div>
   ${running?`<div style="flex:2;height:8px;background:var(--bg);border-radius:4px;overflow:hidden"><div style="width:${(timerLeft/timerTotal)*100}%;height:100%;background:var(--collar);transition:width 1s linear"></div></div>`:""}
   <button class="btn" onclick="startTimer(60)">60s</button>
   <button class="btn" onclick="startTimer(90)">90s</button>
   ${running?`<button class="btn ghost" onclick="stopTimer()">✕</button>`:""}`;
}
function toggle(k){
  const d=today(); data.logs[d]=data.logs[d]||{};
  data.logs[d][k]=!data.logs[d][k]; save(); render();
}
function renderToday(){
  const now=new Date(), blocks=PROGRAM[now.getDay()]||[], done=data.logs[today()]||{};
  const total=blocks.reduce((n,b)=>n+b.ex.length,0);
  const checked=Object.values(done).filter(Boolean).length;
  let html=`<div style="display:flex;justify-content:space-between;align-items:baseline;margin:16px 0 12px">
    <h2>${DAYS[now.getDay()]}</h2>
    <span style="font-size:13px;color:${checked===total&&total>0?"var(--good)":"var(--muted)"}">${checked}/${total} done${checked===total&&total>0?" — bar's racked. Go eat protein.":""}</span></div>`;
  for(const b of blocks){
    html+=`<section class="card"><div style="display:flex;justify-content:space-between;margin-bottom:8px">
      <span style="font-family:'Oswald',sans-serif;font-size:16px;letter-spacing:.05em;text-transform:uppercase">${esc(b.name)}</span>
      ${b.time?`<span style="font-size:13px;color:var(--collar);font-family:'Oswald',sans-serif">${b.time}</span>`:""}</div>`;
    for(const ex of b.ex){
      const k=b.id+"."+ex.id, on=!!done[k], open=!!openInfo[k];
      html+=`<div style="border-top:1px solid var(--line)">
        <div style="display:flex;align-items:stretch">
        <button class="ex${on?" on":""}" style="border-top:none;flex:1" onclick="toggle('${k}')">
          <span class="box">${on?"✓":""}</span>
          <span class="name" style="flex:1">${esc(ex.n)}</span>
          <span style="font-size:13px;color:var(--faint)">${ex.s}</span></button>
        ${ex.d?`<button aria-expanded="${open}" aria-label="How to do ${esc(ex.n)}" onclick="toggleInfo('${k}')" style="background:none;border:none;cursor:pointer;color:${open?"var(--collar)":"var(--faint)"};font-size:14px;padding:0 10px;font-family:'Oswald',sans-serif">${open?"▲":"▼"}</button>`:""}
        </div>
        ${open&&ex.d?`<div style="font-size:13.5px;line-height:1.5;color:var(--muted);background:var(--bg);border-radius:8px;padding:10px 12px;margin:0 4px 10px 36px">${esc(ex.d)}</div>`:""}
      </div>`;
    }
    html+=`</section>`;
  }
  html+=`<div class="card row" id="timer"></div>
   <div class="card" style="display:flex;gap:18px">
     <div class="stat"><div class="lab">Calories</div><div class="val">2,000–2,100</div></div>
     <div class="stat"><div class="lab">Protein</div><div class="val">180 g</div></div>
     <div class="stat"><div class="lab">Window</div><div class="val">12–8 pm</div></div>
   </div>`;
  document.getElementById("main").innerHTML=html;
  renderTimer();
}

// ---------- exercise info toggles ----------
const openInfo={};
function toggleInfo(k){ openInfo[k]=!openInfo[k]; render(); }

// ---------- lift log ----------
function logLift(exId){
  const lb=parseFloat(document.getElementById("in-"+exId).value);
  const reps=parseInt(document.getElementById("reps-"+exId).value,10);
  if(!lb||lb<=0)return;
  const entry={d:today(),lb}; if(reps&&reps>0)entry.reps=reps;
  (data.lifts[exId]=data.lifts[exId]||[]).push(entry); save(); render();
}
function renderLifts(){
  const liftable=[]; [1,5].forEach(d=>PROGRAM[d].forEach(b=>b.ex.forEach(ex=>{
    if(ex.w&&!liftable.find(l=>l.id===ex.id))liftable.push(ex);})));
  let html=`<h2 style="margin-top:16px">Working weights</h2>
   <p class="muted" style="margin:6px 0 14px">Log weight and reps. Beat last time by one rep, then by one small plate — that's the whole recomp game.</p>`;
  for(const ex of liftable){
    const h=data.lifts[ex.id]||[], last=h[h.length-1], prev=h[h.length-2];
    // progress = more weight, or same weight for more reps
    const up=last&&prev&&((last.lb||0)>(prev.lb||0)||((last.lb||0)===(prev.lb||0)&&(last.reps||0)>(prev.reps||0)));
    const lastTxt=last?`Last: ${last.lb?last.lb+" lb":""}${last.lb&&last.reps?" × ":""}${last.reps?last.reps+(last.lb?"":" reps"):""} (${last.d.slice(5)})${up?" ▲ PR pace":""}`:"Not logged yet";
    html+=`<div class="card row" style="flex-wrap:wrap">
      <div style="flex:1 1 160px"><div style="font-size:15px;font-weight:500">${esc(ex.n)}</div>
      <div style="font-size:13px;color:${up?"var(--good)":"var(--faint)"}">${lastTxt}</div></div>
      <input id="in-${ex.id}" type="number" inputmode="decimal" placeholder="lb" style="width:66px">
      <input id="reps-${ex.id}" type="number" inputmode="numeric" placeholder="reps" style="width:66px">
      <button class="btn" onclick="logLift('${ex.id}')">Log</button></div>`;
  }
  document.getElementById("main").innerHTML=html;
}

// ---------- progress ----------
function addWeight(){
  const lb=parseFloat(document.getElementById("in-w").value);
  if(!lb||lb<100||lb>400)return;
  data.weights.push({d:today(),lb}); save(); render();
}
function addMeas(){
  const g=id=>document.getElementById(id).value;
  const m={d:today(),chest:g("in-chest"),arm:g("in-arm"),waist:g("in-waist")};
  if(!m.chest&&!m.arm&&!m.waist)return;
  data.meas.push(m); save(); render();
}
function chartSVG(){
  const pts=data.weights;
  if(pts.length<2)return `<div class="card faint" style="font-size:14px">Two weigh-ins and the trend line shows up here, with the ${GOAL_W} lb finish line marked.</div>`;
  const W=520,H=200,pad={l:34,r:10,t:10,b:22};
  const lo=Math.min(GOAL_W-5,...pts.map(p=>p.lb)), hi=Math.max(START_W+5,...pts.map(p=>p.lb));
  const x=i=>pad.l+(i/(pts.length-1))*(W-pad.l-pad.r);
  const y=v=>pad.t+(1-(v-lo)/(hi-lo))*(H-pad.t-pad.b);
  const line=pts.map((p,i)=>`${i?"L":"M"}${x(i).toFixed(1)},${y(p.lb).toFixed(1)}`).join(" ");
  const dots=pts.map((p,i)=>`<circle cx="${x(i)}" cy="${y(p.lb)}" r="3.5" fill="var(--collar)"><title>${p.d}: ${p.lb} lb</title></circle>`).join("");
  const labels=pts.map((p,i)=>(pts.length<=8||i%Math.ceil(pts.length/8)===0)?`<text x="${x(i)}" y="${H-6}" fill="var(--faint)" font-size="10" text-anchor="middle">${p.d.slice(5)}</text>`:"").join("");
  return `<div class="card"><svg viewBox="0 0 ${W} ${H}" width="100%" role="img" aria-label="Bodyweight trend">
    <line x1="${pad.l}" x2="${W-pad.r}" y1="${y(GOAL_W)}" y2="${y(GOAL_W)}" stroke="var(--collar)" stroke-dasharray="4 4" opacity=".7"/>
    <text x="${W-pad.r}" y="${y(GOAL_W)-5}" fill="var(--collar)" font-size="10" text-anchor="end">goal ${GOAL_W}</text>
    <text x="4" y="${y(hi)+8}" fill="var(--faint)" font-size="10">${hi}</text>
    <text x="4" y="${y(lo)}" fill="var(--faint)" font-size="10">${lo}</text>
    <path d="${line}" fill="none" stroke="var(--collar)" stroke-width="2.5"/>${dots}${labels}</svg></div>`;
}
function renderProgress(){
  const weekAgo=new Date(Date.now()-6*864e5).toISOString().slice(0,10);
  const trained=Object.entries(data.logs).filter(([d,c])=>d>=weekAgo&&Object.values(c).some(Boolean)).length;
  const checks=Object.entries(data.logs).filter(([d])=>d>=weekAgo).reduce((n,[,c])=>n+Object.values(c).filter(Boolean).length,0);
  const liftsUp=Object.values(data.lifts).filter(h=>{
    const r=h.filter(x=>x.d>=weekAgo); if(!r.length)return false;
    const b=h.filter(x=>x.d<weekAgo);
    return !b.length||r[r.length-1].lb>b[b.length-1].lb;}).length;
  const wr=data.weights.filter(x=>x.d>=weekAgo);
  const wDelta=(wr.length&&data.weights.length>wr.length)?(wr[wr.length-1].lb-data.weights[data.weights.length-wr.length-1].lb):null;
  const cur=data.weights.length?data.weights[data.weights.length-1].lb:START_W;
  const lastM=data.meas[data.meas.length-1];
  document.getElementById("main").innerHTML=`
   <h2 style="margin-top:16px">This week</h2>
   <div class="card" style="display:flex;gap:18px;flex-wrap:wrap;margin-top:12px">
     <div class="stat"><div class="lab">Days trained</div><div class="val">${trained}/7</div></div>
     <div class="stat"><div class="lab">Sets checked</div><div class="val">${checks}</div></div>
     <div class="stat"><div class="lab">Lifts up</div><div class="val">${liftsUp}</div></div>
     <div class="stat"><div class="lab">Scale</div><div class="val">${wDelta===null?"—":(wDelta>0?"+":"")+wDelta.toFixed(1)+" lb"}</div></div>
   </div>
   <h2 style="margin-top:22px">Bodyweight</h2>
   <p class="muted" style="margin:6px 0 12px">Weigh in once a week, same day and time. Daily numbers are water noise.</p>
   <div class="card row">
     <input id="in-w" type="number" inputmode="decimal" placeholder="Today: ${cur}?" style="flex:1">
     <button class="btn" onclick="addWeight()">Add weigh-in</button>
   </div>
   ${chartSVG()}
   <h2 style="margin-top:22px">Tape measure</h2>
   <p class="muted" style="margin:6px 0 12px">Monthly is plenty. When you're building muscle while cutting, the tape shows what the scale hides.
   ${lastM?`<span style="color:var(--text)"> Last: chest ${esc(lastM.chest||"—")}″ · arm ${esc(lastM.arm||"—")}″ · waist ${esc(lastM.waist||"—")}″ (${lastM.d.slice(5)})</span>`:""}</p>
   <div class="card" style="display:flex;gap:8px;flex-wrap:wrap">
     <input id="in-chest" type="number" inputmode="decimal" placeholder="chest (in)" style="flex:1 1 80px;min-width:70px">
     <input id="in-arm" type="number" inputmode="decimal" placeholder="arm (in)" style="flex:1 1 80px;min-width:70px">
     <input id="in-waist" type="number" inputmode="decimal" placeholder="waist (in)" style="flex:1 1 80px;min-width:70px">
     <button class="btn" style="flex:1 1 100%" onclick="addMeas()">Save measurements</button>
   </div>`;
}

// ---------- shell ----------
function render(){
  renderBar();
  if(tab==="today")renderToday();
  else if(tab==="lifts")renderLifts();
  else renderProgress();
}
document.querySelectorAll("nav button").forEach(b=>b.addEventListener("click",()=>{
  tab=b.dataset.tab;
  document.querySelectorAll("nav button").forEach(x=>x.classList.toggle("on",x===b));
  render();
}));
render();
</script>
</body>
</html>
